<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fictional 16-Day Cross-Country Tornado — EF5, 1 mi max width</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, Helvetica, Arial, sans-serif; }
  #header {
    background: #1a1a2e;
    color: #fff;
    padding: 10px 14px;
    text-align: center;
  }
  #header h1 { font-size: 16px; margin: 0 0 2px 0; }
  #header .sub { font-size: 11px; color: #aaa; }
  #map { height: calc(100% - 56px); width: 100%; }
  #followBtn {
    position: absolute;
    bottom: 18px;
    left: 18px;
    z-index: 1000;
    background: #1a1a2e;
    color: #fff;
    border: 1px solid #ff2b2b;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
  }
  #followBtn:active { opacity: 0.8; }
  #pauseBtn {
    position: absolute;
    bottom: 18px;
    left: 168px;
    z-index: 1000;
    background: #1a1a2e;
    color: #fff;
    border: 1px solid #ff2b2b;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
  }
  #pauseBtn:active { opacity: 0.8; }
  #restartBtn {
    position: absolute;
    bottom: 18px;
    left: 318px;
    z-index: 1000;
    background: #1a1a2e;
    color: #fff;
    border: 1px solid #ff2b2b;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
  }
  #restartBtn:active { opacity: 0.8; }
</style>
</head>
<body>
<div id="header">
  <h1>Fictional 16-Day Cross-Country Tornado — Peak EF5, 1 mi max width</h1>
  <div class="sub">Test scenario — not a real event · far beyond any recorded tornado duration/track</div>
</div>
<div id="map"></div>
<button id="followBtn">▶ Animate & Follow</button>
<button id="pauseBtn">⏸ Pause</button>
<button id="restartBtn">⟲ Restart</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  const track = [
    { lat: 39.7392, lon: -104.9903, name: "Touchdown — Denver, CO", time: "Day 1", ef: "EF1", widthM: 200 },
    { lat: 38.8403, lon: -97.6114,  name: "Salina, KS",             time: "Day 2", ef: "EF2", widthM: 400 },
    { lat: 37.6872, lon: -97.3301,  name: "Wichita, KS",             time: "Day 3", ef: "EF2", widthM: 600 },
    { lat: 35.4676, lon: -97.5164,  name: "Oklahoma City, OK",       time: "Day 4", ef: "EF3", widthM: 900 },
    { lat: 36.1540, lon: -95.9928,  name: "Tulsa, OK",                time: "Day 5", ef: "EF3", widthM: 1200 },
    { lat: 37.0842, lon: -94.5133,  name: "Joplin, MO",               time: "Day 6", ef: "EF4", widthM: 1400 },
    { lat: 37.2090, lon: -93.2923,  name: "Springfield, MO",          time: "Day 7", ef: "EF4", widthM: 1550 },
    { lat: 38.6270, lon: -90.1994,  name: "St. Louis, MO (peak)",     time: "Day 8", ef: "EF5", widthM: 1609 },
    { lat: 39.7684, lon: -86.1581,  name: "Indianapolis, IN",         time: "Day 9", ef: "EF5", widthM: 1500 },
    { lat: 39.9612, lon: -82.9988,  name: "Columbus, OH",             time: "Day 10", ef: "EF4", widthM: 1300 },
    { lat: 40.4406, lon: -79.9959,  name: "Pittsburgh, PA",           time: "Day 11", ef: "EF3", widthM: 1000 },
    { lat: 40.2732, lon: -76.8867,  name: "Harrisburg, PA",           time: "Day 12", ef: "EF2", widthM: 700 },
    { lat: 39.9526, lon: -75.1652,  name: "Philadelphia, PA",         time: "Day 13", ef: "EF2", widthM: 500 },
    { lat: 40.7128, lon: -74.0060,  name: "New York, NY",             time: "Day 14", ef: "EF1", widthM: 350 },
    { lat: 41.7658, lon: -72.6734,  name: "Hartford, CT",             time: "Day 15", ef: "EF1", widthM: 200 },
    { lat: 42.3601, lon: -71.0589,  name: "Dissipates — Boston, MA",  time: "Day 16", ef: "EF0", widthM: 100 }
  ];

  const map = L.map('map').setView([39.5, -87], 5);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 17
  }).addTo(map);

  const latlngs = track.map(p => [p.lat, p.lon]);
  L.polyline(latlngs, { color: '#ff0000', weight: 2, dashArray: '6 4', opacity: 0.9 }).addTo(map);

  function destPoint(lat, lon, bearingDeg, distM) {
    const R = 6371000;
    const brng = bearingDeg * Math.PI / 180;
    const lat1 = lat * Math.PI / 180;
    const lon1 = lon * Math.PI / 180;
    const lat2 = Math.asin(Math.sin(lat1)*Math.cos(distM/R) + Math.cos(lat1)*Math.sin(distM/R)*Math.cos(brng));
    const lon2 = lon1 + Math.atan2(Math.sin(brng)*Math.sin(distM/R)*Math.cos(lat1), Math.cos(distM/R)-Math.sin(lat1)*Math.sin(lat2));
    return [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI];
  }
  function bearing(lat1, lon1, lat2, lon2) {
    const y = Math.sin((lon2-lon1)*Math.PI/180) * Math.cos(lat2*Math.PI/180);
    const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) -
              Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lon2-lon1)*Math.PI/180);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  }

  const leftSide = [];
  const rightSide = [];
  for (let i = 0; i < track.length; i++) {
    const p = track[i];
    let brg;
    if (i === 0) brg = bearing(track[0].lat, track[0].lon, track[1].lat, track[1].lon);
    else if (i === track.length - 1) brg = bearing(track[i-1].lat, track[i-1].lon, track[i].lat, track[i].lon);
    else {
      const b1 = bearing(track[i-1].lat, track[i-1].lon, p.lat, p.lon);
      const b2 = bearing(p.lat, p.lon, track[i+1].lat, track[i+1].lon);
      brg = (b1 + b2) / 2;
    }
    const half = p.widthM / 2;
    leftSide.push(destPoint(p.lat, p.lon, brg - 90, half));
    rightSide.push(destPoint(p.lat, p.lon, brg + 90, half));
  }
  const swath = leftSide.concat(rightSide.reverse());
  L.polygon(swath, { color: '#ff0000', weight: 1, fillColor: '#ff0000', fillOpacity: 0.35 }).addTo(map);

  track.forEach(p => {
    L.circleMarker([p.lat, p.lon], { radius: 5, color: '#fff', fillColor: '#1a1a2e', fillOpacity: 1, weight: 2 })
      .addTo(map)
      .bindPopup(`<b>${p.name}</b><br>${p.time} &middot; ${p.ef}<br>Width: ${p.widthM} m`);
  });

  map.fitBounds(swath, { padding: [30, 30] });

  // --- animated dot along the track (original simple circleMarker style) ---
  function interpolate(a, b, t) {
    return [a[0] + (b[0]-a[0])*t, a[1] + (b[1]-a[1])*t];
  }

  const animDot = L.circleMarker(latlngs[0], {
    radius: 5,
    color: '#fff',
    weight: 2,
    fillColor: '#ff2b2b',
    fillOpacity: 1
  }).addTo(map);

  const widths = track.map(p => p.widthM);

  // compute cumulative distance along the track so the dot moves at constant speed
  // (equal distance per unit time), rather than equal time per segment
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  const segDistances = [];
  for (let i = 0; i < latlngs.length - 1; i++) {
    segDistances.push(haversine(latlngs[i][0], latlngs[i][1], latlngs[i+1][0], latlngs[i+1][1]));
  }
  const totalDistance = segDistances.reduce((a,b) => a+b, 0);
  const cumulativeDistance = [0];
  segDistances.forEach(d => cumulativeDistance.push(cumulativeDistance[cumulativeDistance.length-1] + d));

  function getPositionAtFraction(frac) {
    const targetDist = frac * totalDistance;
    let segIdx = 0;
    while (segIdx < segDistances.length - 1 && cumulativeDistance[segIdx + 1] < targetDist) segIdx++;
    const segStart = cumulativeDistance[segIdx];
    const segLen = segDistances[segIdx] || 1;
    const segT = Math.min(1, Math.max(0, (targetDist - segStart) / segLen));
    return { segIdx, segT };
  }
  // true-to-scale: convert real-world width (metres) to on-screen pixel radius
  // based on the map's current zoom and latitude, so the dot matches the swath width
  function widthToRadiusPx(widthM, lat) {
    const metersPerPixel = 156543.03392 * Math.abs(Math.cos(lat * Math.PI / 180)) / Math.pow(2, map.getZoom());
    const px = (widthM / 2) / metersPerPixel;
    return Math.max(3, px);
  }

  const durationMsDefault = 70000; // default loop time (slowed a lot)
  const durationMsFollow = 140000; // slower loop time when following
  const followZoom = 11;
  let followMode = false;
  let durationMs = durationMsDefault;
  let isPaused = false;
  let elapsed = 0;
  let lastFrameTs = null;
  const segCount = latlngs.length - 1;

  function animate(ts) {
    if (lastFrameTs === null) lastFrameTs = ts;
    const dt = ts - lastFrameTs;
    lastFrameTs = ts;
    if (!isPaused) elapsed += dt;

    const t = (elapsed % durationMs) / durationMs;
    const { segIdx, segT } = getPositionAtFraction(t);
    const pos = interpolate(latlngs[segIdx], latlngs[segIdx + 1], segT);
    const currentWidthM = widths[segIdx] + (widths[segIdx + 1] - widths[segIdx]) * segT;
    animDot.setLatLng(pos);
    animDot.setRadius(widthToRadiusPx(currentWidthM, pos[0]));
    if (followMode) {
      map.setView(pos, followZoom, { animate: false });
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  const followBtn = document.getElementById('followBtn');
  followBtn.addEventListener('click', () => {
    followMode = !followMode;
    if (followMode) {
      durationMs = durationMsFollow;
      followBtn.textContent = '■ Stop Following';
    } else {
      durationMs = durationMsDefault;
      followBtn.textContent = '▶ Animate & Follow';
      map.fitBounds(swath, { padding: [30, 30] });
    }
  });

  const pauseBtn = document.getElementById('pauseBtn');
  pauseBtn.addEventListener('click', () => {
    isPaused = !isPaused;
    pauseBtn.textContent = isPaused ? '▶ Resume' : '⏸ Pause';
  });

  const restartBtn = document.getElementById('restartBtn');
  restartBtn.addEventListener('click', () => {
    elapsed = 0;
  });
</script>
</body>
</html>
