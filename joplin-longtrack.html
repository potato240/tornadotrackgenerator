<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fictional Joplin Tornado Path — EF4, 3 mi wide, long track</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, Helvetica, Arial, sans-serif; }
  #header {
    background: #1a1a2e;
    color: #fff;
    padding: 10px 14px;
    text-align: center;
  }
  #header h1 { font-size: 16px; margin: 0 0 2px 0; }
  #header .sub { font-size: 11px; color: #aaa; }
  #map { height: calc(100% - 56px); width: 100%; }
  #followBtn {
    position: absolute;
    bottom: 18px;
    left: 18px;
    z-index: 1000;
    background: #1a1a2e;
    color: #fff;
    border: 1px solid #ff2b2b;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
  }
  #followBtn:active { opacity: 0.8; }
  #pauseBtn {
    position: absolute;
    bottom: 18px;
    left: 168px;
    z-index: 1000;
    background: #1a1a2e;
    color: #fff;
    border: 1px solid #ff2b2b;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
  }
  #pauseBtn:active { opacity: 0.8; }
  #restartBtn {
    position: absolute;
    bottom: 18px;
    left: 318px;
    z-index: 1000;
    background: #1a1a2e;
    color: #fff;
    border: 1px solid #ff2b2b;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
  }
  #restartBtn:active { opacity: 0.8; }

  .tornado-icon { position: relative; }
  .tornado-scale {
    position: absolute;
    top: 50%; left: 50%;
    width: 50px; height: 50px;
    margin: -25px 0 0 -25px;
    transform: scale(1);
  }
  .tornado-spin {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    overflow: hidden;
    animation: tornado-spin 1.1s linear infinite;
  }
  .tornado-spin svg { width: 100%; height: 100%; display: block; }
  .tornado-glow {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid #ff2b2b;
    opacity: 0.7;
    animation: tornado-pulse 1.4s ease-out infinite;
  }
  @keyframes tornado-spin { to { transform: rotate(360deg); } }
  @keyframes tornado-pulse {
    0%   { transform: scale(1);   opacity: 0.7; }
    100% { transform: scale(2.2); opacity: 0; }
  }
</style>
</head>
<body>
<div id="header">
  <h1>Fictional Long-Track Tornado Through Joplin, MO — EF4, ~3 mi wide</h1>
  <div class="sub">Test scenario — not a real event · width shown to scale (metres)</div>
</div>
<div id="map"></div>
<button id="followBtn">▶ Animate & Follow</button>
<button id="pauseBtn">⏸ Pause</button>
<button id="restartBtn">⟲ Restart</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  const track = [
    { lat: 36.7200, lon: -95.3200, name: "Touchdown — near Vinita, OK", time: "4:50 PM", ef: "EF1", widthM: 300 },
    { lat: 36.8100, lon: -95.1200, name: "NE of Vinita, strengthening", time: "5:00 PM", ef: "EF2", widthM: 900 },
    { lat: 36.9000, lon: -94.9200, name: "Crossing into Missouri", time: "5:10 PM", ef: "EF3", widthM: 1800 },
    { lat: 36.9700, lon: -94.7400, name: "SW of Joplin, intensifying", time: "5:20 PM", ef: "EF3", widthM: 2600 },
    { lat: 37.0330, lon: -94.6280, name: "Entering Joplin", time: "5:34 PM", ef: "EF4", widthM: 4000 },
    { lat: 37.0650, lon: -94.5130, name: "Central Joplin (peak intensity)", time: "5:46 PM", ef: "EF4", widthM: 4800 },
    { lat: 37.0830, lon: -94.4520, name: "East Joplin / Duquesne", time: "5:52 PM", ef: "EF4", widthM: 4000 },
    { lat: 37.1200, lon: -94.2500, name: "Toward Carthage, weakening", time: "6:05 PM", ef: "EF3", widthM: 2200 },
    { lat: 37.1800, lon: -94.0200, name: "NE of Carthage", time: "6:20 PM", ef: "EF2", widthM: 1200 },
    { lat: 37.2400, lon: -93.7800, name: "Approaching Lamar", time: "6:35 PM", ef: "EF2", widthM: 800 },
    { lat: 37.3100, lon: -93.5000, name: "Dissipates near Golden City", time: "6:50 PM", ef: "EF1", widthM: 300 }
  ];

  const map = L.map('map').setView([37.0, -94.5], 8);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 17
  }).addTo(map);

  const latlngs = track.map(p => [p.lat, p.lon]);
  L.polyline(latlngs, { color: '#ff0000', weight: 2, dashArray: '6 4', opacity: 0.9 }).addTo(map);

  function destPoint(lat, lon, bearingDeg, distM) {
    const R = 6371000;
    const brng = bearingDeg * Math.PI / 180;
    const lat1 = lat * Math.PI / 180;
    const lon1 = lon * Math.PI / 180;
    const lat2 = Math.asin(Math.sin(lat1)*Math.cos(distM/R) + Math.cos(lat1)*Math.sin(distM/R)*Math.cos(brng));
    const lon2 = lon1 + Math.atan2(Math.sin(brng)*Math.sin(distM/R)*Math.cos(lat1), Math.cos(distM/R)-Math.sin(lat1)*Math.sin(lat2));
    return [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI];
  }
  function bearing(lat1, lon1, lat2, lon2) {
    const y = Math.sin((lon2-lon1)*Math.PI/180) * Math.cos(lat2*Math.PI/180);
    const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) -
              Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lon2-lon1)*Math.PI/180);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  }

  const leftSide = [];
  const rightSide = [];
  for (let i = 0; i < track.length; i++) {
    const p = track[i];
    let brg;
    if (i === 0) brg = bearing(track[0].lat, track[0].lon, track[1].lat, track[1].lon);
    else if (i === track.length - 1) brg = bearing(track[i-1].lat, track[i-1].lon, track[i].lat, track[i].lon);
    else {
      const b1 = bearing(track[i-1].lat, track[i-1].lon, p.lat, p.lon);
      const b2 = bearing(p.lat, p.lon, track[i+1].lat, track[i+1].lon);
      brg = (b1 + b2) / 2;
    }
    const half = p.widthM / 2;
    leftSide.push(destPoint(p.lat, p.lon, brg - 90, half));
    rightSide.push(destPoint(p.lat, p.lon, brg + 90, half));
  }
  const swath = leftSide.concat(rightSide.reverse());
  L.polygon(swath, { color: '#ff0000', weight: 1, fillColor: '#ff0000', fillOpacity: 0.35 }).addTo(map);

  track.forEach(p => {
    L.circleMarker([p.lat, p.lon], { radius: 5, color: '#fff', fillColor: '#1a1a2e', fillOpacity: 1, weight: 2 })
      .addTo(map)
      .bindPopup(`<b>${p.name}</b><br>${p.time} &middot; ${p.ef}<br>Width: ${p.widthM} m`);
  });

  map.fitBounds(swath, { padding: [30, 30] });

  // --- animated dot along the track ---
  function interpolate(a, b, t) {
    return [a[0] + (b[0]-a[0])*t, a[1] + (b[1]-a[1])*t];
  }

  const animDot = L.marker(latlngs[0], {
    icon: L.divIcon({
      className: 'tornado-icon',
      html: '<div class="tornado-scale"><div class="tornado-glow"></div><div class="tornado-spin"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="#ff2b2b" fill-opacity="0.65" stroke="#ff2b2b" stroke-width="3"/><line x1="82.5" y1="82.5" x2="77.0" y2="51.0" stroke="#e0402f" stroke-width="6" stroke-linecap="round"/><line x1="29.1" y1="91.0" x2="57.4" y2="76.0" stroke="#e0402f" stroke-width="6" stroke-linecap="round"/><line x1="4.6" y1="42.8" x2="27.6" y2="65.0" stroke="#e0402f" stroke-width="6" stroke-linecap="round"/><line x1="42.8" y1="4.6" x2="28.8" y2="33.3" stroke="#e0402f" stroke-width="6" stroke-linecap="round"/><line x1="91.0" y1="29.1" x2="59.3" y2="24.7" stroke="#e0402f" stroke-width="6" stroke-linecap="round"/></svg></div></div>',
      iconSize: [50, 50],
      iconAnchor: [25, 25]
    }),
    interactive: false
  }).addTo(map);

  const widths = track.map(p => p.widthM);
  // true-to-scale: convert real-world width (metres) to on-screen pixel radius
  // based on the map's current zoom and latitude, so the dot matches the swath width
  function widthToRadiusPx(widthM, lat) {
    const metersPerPixel = 156543.03392 * Math.abs(Math.cos(lat * Math.PI / 180)) / Math.pow(2, map.getZoom());
    const px = (widthM / 2) / metersPerPixel;
    return Math.max(3, px);
  }

  const durationMsDefault = 28000; // default loop time (slowed down)
  const durationMsFollow = 60000;  // slower loop time when following
  const followZoom = 12;
  let followMode = false;
  let durationMs = durationMsDefault;
  let isPaused = false;
  let elapsed = 0;
  let lastFrameTs = null;
  const segCount = latlngs.length - 1;

  function animate(ts) {
    if (lastFrameTs === null) lastFrameTs = ts;
    const dt = ts - lastFrameTs;
    lastFrameTs = ts;
    if (!isPaused) elapsed += dt;

    const t = (elapsed % durationMs) / durationMs;
    const segFloat = t * segCount;
    const segIdx = Math.min(Math.floor(segFloat), segCount - 1);
    const segT = segFloat - segIdx;
    const pos = interpolate(latlngs[segIdx], latlngs[segIdx + 1], segT);
    const currentWidthM = widths[segIdx] + (widths[segIdx + 1] - widths[segIdx]) * segT;
    animDot.setLatLng(pos);
    const radiusPx = widthToRadiusPx(currentWidthM, pos[0]);
    const scaleFactor = radiusPx / 25; // base icon half-size is 25px
    const el = animDot.getElement();
    if (el) {
      const scaleEl = el.querySelector('.tornado-scale');
      if (scaleEl) scaleEl.style.transform = `scale(${scaleFactor})`;
    }
    if (followMode) {
      map.setView(pos, followZoom, { animate: false });
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  const followBtn = document.getElementById('followBtn');
  followBtn.addEventListener('click', () => {
    followMode = !followMode;
    if (followMode) {
      durationMs = durationMsFollow;
      followBtn.textContent = '■ Stop Following';
    } else {
      durationMs = durationMsDefault;
      followBtn.textContent = '▶ Animate & Follow';
      map.fitBounds(swath, { padding: [30, 30] });
    }
  });

  const pauseBtn = document.getElementById('pauseBtn');
  pauseBtn.addEventListener('click', () => {
    isPaused = !isPaused;
    pauseBtn.textContent = isPaused ? '▶ Resume' : '⏸ Pause';
  });

  const restartBtn = document.getElementById('restartBtn');
  restartBtn.addEventListener('click', () => {
    elapsed = 0;
  });
</script>
</body>
</html>
