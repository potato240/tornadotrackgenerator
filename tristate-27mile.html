<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fictional Long-Lived Tri-State Tornado — EF5, 27 mi max width</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, Helvetica, Arial, sans-serif; }
  #header {
    background: #1a1a2e;
    color: #fff;
    padding: 10px 14px;
    text-align: center;
  }
  #header h1 { font-size: 16px; margin: 0 0 2px 0; }
  #header .sub { font-size: 11px; color: #aaa; }
  #map { height: calc(100% - 56px); width: 100%; }
  #controls {
    position: absolute;
    bottom: 18px;
    left: 12px;
    right: 12px;
    z-index: 1000;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  #controls button {
    background: #1a1a2e;
    color: #fff;
    border: 1px solid #ff2b2b;
    padding: 10px 14px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 6px;
    cursor: pointer;
  }
  #funBtn { border-color: #3fa9f5 !important; }
  #joystickBase {
    position: absolute;
    bottom: 90px;
    right: 30px;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: rgba(26,26,46,0.55);
    border: 2px solid #3fa9f5;
    z-index: 1000;
    display: none;
    touch-action: none;
  }
  #joystickKnob {
    position: absolute;
    top: 50%; left: 50%;
    width: 50px; height: 50px;
    margin: -25px 0 0 -25px;
    border-radius: 50%;
    background: #3fa9f5;
    border: 2px solid #fff;
  }
</style>
</head>
<body>
<div id="header">
  <h1>Fictional Long-Lived Tri-State Tornado — Peak EF5, 27 mi max width</h1>
  <div class="sub">Test scenario — follows the real 1925 Tri-State Tornado route, width/duration exaggerated</div>
</div>
<div id="map"></div>
<div id="controls">
  <button id="followBtn">▶ Animate & Follow</button>
  <button id="pauseBtn">⏸ Pause</button>
  <button id="restartBtn">⟲ Restart</button>
  <button id="funBtn">🎮 Fun Mode</button>
</div>
<div id="joystickBase"><div id="joystickKnob"></div></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  const track = [
    { lat: 37.2001, lon: -90.9857, name: "Touchdown — Ellington, MO",     time: "Day 1", ef: "EF2", widthM: 1600 },
    { lat: 37.3706, lon: -90.7015, name: "Annapolis, MO",                  time: "Day 1", ef: "EF3", widthM: 4000 },
    { lat: 37.5300, lon: -89.8500, name: "Biehle area, MO",                time: "Day 1", ef: "EF4", widthM: 9000 },
    { lat: 37.7642, lon: -89.3373, name: "Murphysboro, IL",                time: "Day 2", ef: "EF5", widthM: 30000 },
    { lat: 37.8256, lon: -89.2251, name: "De Soto, IL (peak)",             time: "Day 2", ef: "EF5", widthM: 43452 },
    { lat: 37.8981, lon: -88.9298, name: "West Frankfort, IL",             time: "Day 2", ef: "EF5", widthM: 32000 },
    { lat: 37.9345, lon: -88.7712, name: "Parrish, IL",                    time: "Day 3", ef: "EF4", widthM: 18000 },
    { lat: 38.2578, lon: -87.7847, name: "Griffin, IN",                    time: "Day 3", ef: "EF4", widthM: 10000 },
    { lat: 38.3548, lon: -87.5686, name: "Princeton, IN",                  time: "Day 3", ef: "EF3", widthM: 6000 },
    { lat: 38.4909, lon: -87.2778, name: "Petersburg, IN (historical end)",time: "Day 4", ef: "EF3", widthM: 4000 },
    { lat: 39.1653, lon: -86.5264, name: "Bloomington, IN",                time: "Day 4", ef: "EF2", widthM: 2200 },
    { lat: 39.7684, lon: -86.1581, name: "Indianapolis, IN",               time: "Day 5", ef: "EF2", widthM: 1400 },
    { lat: 39.7589, lon: -84.1916, name: "Dayton, OH",                     time: "Day 5", ef: "EF1", widthM: 700 },
    { lat: 39.9612, lon: -82.9988, name: "Dissipates — Columbus, OH",      time: "Day 6", ef: "EF0", widthM: 300 }
  ];

  const map = L.map('map').setView([38.3, -88.5], 6);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors',
    maxZoom: 18
  }).addTo(map);

  const latlngs = track.map(p => [p.lat, p.lon]);
  L.polyline(latlngs, { color: '#ff0000', weight: 2, dashArray: '6 4', opacity: 0.9 }).addTo(map);

  function destPoint(lat, lon, bearingDeg, distM) {
    const R = 6371000;
    const brng = bearingDeg * Math.PI / 180;
    const lat1 = lat * Math.PI / 180;
    const lon1 = lon * Math.PI / 180;
    const lat2 = Math.asin(Math.sin(lat1)*Math.cos(distM/R) + Math.cos(lat1)*Math.sin(distM/R)*Math.cos(brng));
    const lon2 = lon1 + Math.atan2(Math.sin(brng)*Math.sin(distM/R)*Math.cos(lat1), Math.cos(distM/R)-Math.sin(lat1)*Math.sin(lat2));
    return [lat2 * 180 / Math.PI, lon2 * 180 / Math.PI];
  }
  function bearing(lat1, lon1, lat2, lon2) {
    const y = Math.sin((lon2-lon1)*Math.PI/180) * Math.cos(lat2*Math.PI/180);
    const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180) -
              Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lon2-lon1)*Math.PI/180);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  }

  const leftSide = [];
  const rightSide = [];
  for (let i = 0; i < track.length; i++) {
    const p = track[i];
    let brg;
    if (i === 0) brg = bearing(track[0].lat, track[0].lon, track[1].lat, track[1].lon);
    else if (i === track.length - 1) brg = bearing(track[i-1].lat, track[i-1].lon, track[i].lat, track[i].lon);
    else {
      const b1 = bearing(track[i-1].lat, track[i-1].lon, p.lat, p.lon);
      const b2 = bearing(p.lat, p.lon, track[i+1].lat, track[i+1].lon);
      brg = (b1 + b2) / 2;
    }
    const half = p.widthM / 2;
    leftSide.push(destPoint(p.lat, p.lon, brg - 90, half));
    rightSide.push(destPoint(p.lat, p.lon, brg + 90, half));
  }
  const swath = leftSide.concat(rightSide.reverse());
  L.polygon(swath, { color: '#ff0000', weight: 1, fillColor: '#ff0000', fillOpacity: 0.35 }).addTo(map);

  track.forEach(p => {
    L.circleMarker([p.lat, p.lon], { radius: 5, color: '#fff', fillColor: '#1a1a2e', fillOpacity: 1, weight: 2 })
      .addTo(map)
      .bindPopup(`<b>${p.name}</b><br>${p.time} &middot; ${p.ef}<br>Width: ${p.widthM} m`);
  });

  map.fitBounds(swath, { padding: [30, 30] });

  function interpolate(a, b, t) {
    return [a[0] + (b[0]-a[0])*t, a[1] + (b[1]-a[1])*t];
  }

  const animDot = L.circleMarker(latlngs[0], {
    radius: 5, color: '#fff', weight: 2, fillColor: '#ff2b2b', fillOpacity: 1
  }).addTo(map);

  const widths = track.map(p => p.widthM);

  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371000;
    const dLat = (lat2-lat1) * Math.PI/180;
    const dLon = (lon2-lon1) * Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  const segDistances = [];
  for (let i = 0; i < latlngs.length - 1; i++) {
    segDistances.push(haversine(latlngs[i][0], latlngs[i][1], latlngs[i+1][0], latlngs[i+1][1]));
  }
  const totalDistance = segDistances.reduce((a,b) => a+b, 0);
  const cumulativeDistance = [0];
  segDistances.forEach(d => cumulativeDistance.push(cumulativeDistance[cumulativeDistance.length-1] + d));

  function getPositionAtFraction(frac) {
    const targetDist = frac * totalDistance;
    let segIdx = 0;
    while (segIdx < segDistances.length - 1 && cumulativeDistance[segIdx + 1] < targetDist) segIdx++;
    const segStart = cumulativeDistance[segIdx];
    const segLen = segDistances[segIdx] || 1;
    const segT = Math.min(1, Math.max(0, (targetDist - segStart) / segLen));
    return { segIdx, segT };
  }

  function widthToRadiusPx(widthM, lat) {
    const metersPerPixel = 156543.03392 * Math.abs(Math.cos(lat * Math.PI / 180)) / Math.pow(2, map.getZoom());
    const px = (widthM / 2) / metersPerPixel;
    return Math.max(3, px);
  }

  const durationMsDefault = 70000;
  const durationMsFollow = 140000;
  const followZoom = 11;
  let followMode = false;
  let durationMs = durationMsDefault;
  let isPaused = false;
  let elapsed = 0;
  let lastFrameTs = null;

  function animate(ts) {
    if (lastFrameTs === null) lastFrameTs = ts;
    const dt = ts - lastFrameTs;
    lastFrameTs = ts;

    if (funMode) {
      funModeStep(dt);
      requestAnimationFrame(animate);
      return;
    }

    if (!isPaused) elapsed += dt;

    const t = (elapsed % durationMs) / durationMs;
    const { segIdx, segT } = getPositionAtFraction(t);
    const pos = interpolate(latlngs[segIdx], latlngs[segIdx + 1], segT);
    const currentWidthM = widths[segIdx] + (widths[segIdx + 1] - widths[segIdx]) * segT;
    animDot.setLatLng(pos);
    animDot.setRadius(widthToRadiusPx(currentWidthM, pos[0]));
    if (followMode) {
      map.setView(pos, followZoom, { animate: false });
    }
    requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);

  const followBtn = document.getElementById('followBtn');
  followBtn.addEventListener('click', () => {
    followMode = !followMode;
    if (followMode) {
      durationMs = durationMsFollow;
      followBtn.textContent = '■ Stop Following';
    } else {
      durationMs = durationMsDefault;
      followBtn.textContent = '▶ Animate & Follow';
      map.fitBounds(swath, { padding: [30, 30] });
    }
  });

  const pauseBtn = document.getElementById('pauseBtn');
  pauseBtn.addEventListener('click', () => {
    isPaused = !isPaused;
    pauseBtn.textContent = isPaused ? '▶ Resume' : '⏸ Pause';
  });

  const restartBtn = document.getElementById('restartBtn');
  restartBtn.addEventListener('click', () => {
    elapsed = 0;
  });

  // --- Fun Mode: joystick-controlled free movement ---
  let funMode = false;
  let joyActive = false;
  let joyDx = 0, joyDy = 0;
  let freePos = latlngs[0].slice();

  const funBtn = document.getElementById('funBtn');
  const joystickBase = document.getElementById('joystickBase');
  const joystickKnob = document.getElementById('joystickKnob');

  funBtn.addEventListener('click', () => {
    funMode = !funMode;
    if (funMode) {
      followMode = false;
      followBtn.textContent = '▶ Animate & Follow';
      freePos = [animDot.getLatLng().lat, animDot.getLatLng().lng];
      joystickBase.style.display = 'block';
      funBtn.textContent = '🎮 Exit Fun Mode';
    } else {
      joystickBase.style.display = 'none';
      joyActive = false;
      joyDx = 0; joyDy = 0;
      joystickKnob.style.transform = 'translate(0px, 0px)';
      funBtn.textContent = '🎮 Fun Mode';
    }
  });

  function updateJoystickFromEvent(clientX, clientY) {
    const rect = joystickBase.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = clientX - cx;
    let dy = clientY - cy;
    const maxR = rect.width / 2;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > maxR) {
      dx = dx / dist * maxR;
      dy = dy / dist * maxR;
    }
    joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
    joyDx = dx / maxR;
    joyDy = dy / maxR;
  }

  function resetJoystick() {
    joyActive = false;
    joyDx = 0; joyDy = 0;
    joystickKnob.style.transform = 'translate(0px, 0px)';
  }

  joystickBase.addEventListener('pointerdown', (e) => {
    joyActive = true;
    updateJoystickFromEvent(e.clientX, e.clientY);
    joystickBase.setPointerCapture(e.pointerId);
  });
  joystickBase.addEventListener('pointermove', (e) => {
    if (joyActive) updateJoystickFromEvent(e.clientX, e.clientY);
  });
  joystickBase.addEventListener('pointerup', resetJoystick);
  joystickBase.addEventListener('pointercancel', resetJoystick);

  const funSpeedMPerSec = 3000;
  function funModeStep(dtMs) {
    if (!funMode || (joyDx === 0 && joyDy === 0)) return;
    const distM = funSpeedMPerSec * (dtMs / 1000);
    const moveBearing = (Math.atan2(joyDx, -joyDy) * 180 / Math.PI + 360) % 360;
    const moveDist = distM * Math.min(1, Math.sqrt(joyDx*joyDx + joyDy*joyDy));
    const newPos = destPoint(freePos[0], freePos[1], moveBearing, moveDist);
    freePos = newPos;
    animDot.setLatLng(freePos);
    animDot.setRadius(widthToRadiusPx(1500, freePos[0]));
    if (!followMode) {
      map.panTo(freePos, { animate: false });
    }
  }
</script>
</body>
</html>
